<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时语音识别系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .card h2 {
            color: #333;
            margin-bottom: 16px;
            font-size: 1.2rem;
            border-bottom: 2px solid #667eea;
            padding-bottom: 8px;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            margin: 4px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #f5576c 0%, #f093fb 100%);
            color: white;
        }
        
        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(245, 87, 108, 0.4);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }
        
        .recording-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            background: #f5576c;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .result-box {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 16px;
            min-height: 100px;
            margin-top: 16px;
            font-size: 1rem;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }
        
        .result-box.empty {
            color: #999;
            font-style: italic;
        }
        
        .file-input-wrapper {
            position: relative;
            display: inline-block;
        }
        
        .file-input-wrapper input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
        
        .status {
            padding: 8px 16px;
            border-radius: 8px;
            margin-top: 12px;
            font-size: 0.9rem;
        }
        
        .status.info {
            background: #e3f2fd;
            color: #1565c0;
        }
        
        .status.success {
            background: #e8f5e9;
            color: #2e7d32;
        }
        
        .status.error {
            background: #ffebee;
            color: #c62828;
        }
        
        .language-select {
            padding: 8px 16px;
            border: 2px solid #667eea;
            border-radius: 8px;
            font-size: 1rem;
            margin: 8px 0;
            cursor: pointer;
        }
        
        .info-text {
            color: #666;
            font-size: 0.85rem;
            margin-top: 8px;
        }
        
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }
        
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>实时语音识别系统</h1>
        
        <!-- 实时录音识别 -->
        <div class="card">
            <h2>实时录音识别</h2>
            <p class="info-text">点击开始录音，系统将实时识别您的语音内容</p>
            
            <div style="margin: 16px 0;">
                <label for="realtime-lang">识别语言：</label>
                <select id="realtime-lang" class="language-select">
                    <option value="">自动检测</option>
                    <option value="zh">中文</option>
                    <option value="en">英文</option>
                    <option value="ja">日文</option>
                    <option value="ko">韩文</option>
                </select>
            </div>
            
            <div>
                <button id="start-record" class="btn btn-primary">开始录音</button>
                <button id="stop-record" class="btn btn-danger" disabled>停止录音</button>
            </div>
            
            <div id="recording-status" class="status info" style="display: none;"></div>
            
            <div class="result-box empty" id="realtime-result">
                实时识别结果将显示在这里...
            </div>
        </div>
        
        <!-- 文件上传识别 -->
        <div class="card">
            <h2>音频文件上传识别</h2>
            <p class="info-text">支持 WAV、MP3、M4A、FLAC、OGG、WEBM 格式</p>
            
            <div style="margin: 16px 0;">
                <label for="file-lang">识别语言：</label>
                <select id="file-lang" class="language-select">
                    <option value="">自动检测</option>
                    <option value="zh">中文</option>
                    <option value="en">英文</option>
                    <option value="ja">日文</option>
                    <option value="ko">韩文</option>
                </select>
            </div>
            
            <div class="file-input-wrapper">
                <button class="btn btn-primary">选择音频文件</button>
                <input type="file" id="audio-file" accept=".wav,.mp3,.m4a,.flac,.ogg,.webm">
            </div>
            <button id="upload-btn" class="btn btn-primary" disabled>开始识别</button>
            
            <div class="progress-bar" id="upload-progress" style="display: none;">
                <div class="progress-bar-fill" id="progress-fill"></div>
            </div>
            
            <div id="upload-status" class="status info" style="display: none;"></div>
            
            <div class="result-box empty" id="file-result">
                文件识别结果将显示在这里...
            </div>
        </div>
    </div>

    <script>
        // 配置
        const WS_URL = `ws://${window.location.host}/ws/transcribe`;
        const API_URL = '/transcribe/file';
        
        // DOM 元素
        const startRecordBtn = document.getElementById('start-record');
        const stopRecordBtn = document.getElementById('stop-record');
        const realtimeResult = document.getElementById('realtime-result');
        const recordingStatus = document.getElementById('recording-status');
        const realtimeLangSelect = document.getElementById('realtime-lang');
        
        const audioFileInput = document.getElementById('audio-file');
        const uploadBtn = document.getElementById('upload-btn');
        const fileResult = document.getElementById('file-result');
        const uploadStatus = document.getElementById('upload-status');
        const uploadProgress = document.getElementById('upload-progress');
        const progressFill = document.getElementById('progress-fill');
        const fileLangSelect = document.getElementById('file-lang');
        
        // 录音相关变量
        let mediaRecorder = null;
        let audioContext = null;
        let audioStream = null;
        let websocket = null;
        let audioChunks = [];
        let isRecording = false;
        
        // 文件选择处理
        audioFileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                uploadBtn.disabled = false;
                uploadStatus.textContent = `已选择文件: ${file.name}`;
                uploadStatus.className = 'status info';
                uploadStatus.style.display = 'block';
            }
        });
        
        // 文件上传识别
        uploadBtn.addEventListener('click', async () => {
            const file = audioFileInput.files[0];
            if (!file) return;
            
            const formData = new FormData();
            formData.append('file', file);
            const lang = fileLangSelect.value;
            if (lang) {
                formData.append('language', lang);
            }
            
            uploadBtn.disabled = true;
            uploadProgress.style.display = 'block';
            progressFill.style.width = '30%';
            uploadStatus.textContent = '正在识别中...';
            uploadStatus.className = 'status info';
            uploadStatus.style.display = 'block';
            fileResult.textContent = '识别中...';
            fileResult.className = 'result-box';
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: formData
                });
                
                progressFill.style.width = '100%';
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const result = await response.json();
                
                fileResult.textContent = result.text || '(无识别结果)';
                fileResult.className = 'result-box';
                uploadStatus.textContent = `识别完成！语言: ${result.language} (置信度: ${(result.language_probability * 100).toFixed(1)}%), 时长: ${result.duration.toFixed(1)}秒`;
                uploadStatus.className = 'status success';
            } catch (error) {
                console.error('Upload error:', error);
                fileResult.textContent = '识别失败';
                fileResult.className = 'result-box';
                uploadStatus.textContent = `错误: ${error.message}`;
                uploadStatus.className = 'status error';
            } finally {
                uploadBtn.disabled = false;
                setTimeout(() => {
                    uploadProgress.style.display = 'none';
                    progressFill.style.width = '0%';
                }, 1000);
            }
        });
        
        // 开始录音
        startRecordBtn.addEventListener('click', async () => {
            try {
                audioStream = await navigator.mediaDevices.getUserMedia({ 
                    audio: {
                        sampleRate: 16000,
                        channelCount: 1,
                        echoCancellation: true,
                        noiseSuppression: true
                    } 
                });
                
                audioContext = new (window.AudioContext || window.webkitAudioContext)({
                    sampleRate: 16000
                });
                
                // 连接 WebSocket
                websocket = new WebSocket(WS_URL);
                
                websocket.onopen = () => {
                    // 发送配置
                    websocket.send(JSON.stringify({
                        type: 'config',
                        language: realtimeLangSelect.value || null,
                        sample_rate: 16000
                    }));
                    
                    // 开始录音
                    startRecording();
                };
                
                websocket.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    handleWebSocketMessage(data);
                };
                
                websocket.onerror = (error) => {
                    console.error('WebSocket error:', error);
                    recordingStatus.textContent = '连接错误';
                    recordingStatus.className = 'status error';
                    stopRecording();
                };
                
                websocket.onclose = () => {
                    console.log('WebSocket closed');
                    if (isRecording) {
                        stopRecording();
                    }
                };
                
            } catch (error) {
                console.error('Error accessing microphone:', error);
                recordingStatus.textContent = '无法访问麦克风，请检查权限设置';
                recordingStatus.className = 'status error';
                recordingStatus.style.display = 'block';
            }
        });
        
        // 停止录音
        stopRecordBtn.addEventListener('click', () => {
            stopRecording();
        });
        
        function startRecording() {
            isRecording = true;
            startRecordBtn.disabled = true;
            stopRecordBtn.disabled = false;
            
            recordingStatus.innerHTML = '<span class="recording-indicator"></span>正在录音...';
            recordingStatus.className = 'status info';
            recordingStatus.style.display = 'block';
            
            realtimeResult.textContent = '';
            realtimeResult.className = 'result-box';
            
            // 使用 ScriptProcessor 处理音频
            const source = audioContext.createMediaStreamSource(audioStream);
            const processor = audioContext.createScriptProcessor(4096, 1, 1);
            
            processor.onaudioprocess = (e) => {
                if (!isRecording) return;
                
                const inputData = e.inputBuffer.getChannelData(0);
                // 转换为 16bit PCM
                const pcmData = floatTo16BitPCM(inputData);
                
                if (websocket && websocket.readyState === WebSocket.OPEN) {
                    websocket.send(pcmData);
                }
            };
            
            source.connect(processor);
            processor.connect(audioContext.destination);
            
            // 保存引用以便清理
            window.audioProcessor = processor;
            window.audioSource = source;
        }
        
        function stopRecording() {
            isRecording = false;
            startRecordBtn.disabled = false;
            stopRecordBtn.disabled = true;
            
            if (window.audioProcessor) {
                window.audioProcessor.disconnect();
                window.audioProcessor = null;
            }
            
            if (window.audioSource) {
                window.audioSource.disconnect();
                window.audioSource = null;
            }
            
            if (audioStream) {
                audioStream.getTracks().forEach(track => track.stop());
                audioStream = null;
            }
            
            if (audioContext) {
                audioContext.close();
                audioContext = null;
            }
            
            if (websocket) {
                websocket.close();
                websocket = null;
            }
            
            recordingStatus.textContent = '录音已停止';
            recordingStatus.className = 'status success';
        }
        
        function handleWebSocketMessage(data) {
            console.log('Received:', data);
            
            if (data.type === 'segment') {
                // 追加识别片段
                realtimeResult.textContent += data.text;
                realtimeResult.className = 'result-box';
            } else if (data.type === 'final') {
                // 最终结果
                realtimeResult.textContent = data.text;
                realtimeResult.className = 'result-box';
            } else if (data.type === 'error') {
                recordingStatus.textContent = `错误: ${data.message}`;
                recordingStatus.className = 'status error';
            }
        }
        
        // Float32 转 16bit PCM
        function floatTo16BitPCM(float32Array) {
            const buffer = new ArrayBuffer(float32Array.length * 2);
            const view = new DataView(buffer);
            
            for (let i = 0; i < float32Array.length; i++) {
                let s = Math.max(-1, Math.min(1, float32Array[i]));
                view.setInt16(i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
            }
            
            return buffer;
        }
    </script>
</body>
</html>
